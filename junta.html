<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junta Directiva - CCRD Ferroviario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container page-content-padding" style="margin: 40px auto;">
        <div style="text-align: center; margin-bottom: 40px;">
            <h2 style="color: var(--color-primario); font-size: 2.2rem;">Junta Directiva</h2>
            <p style="color: #64748b;">Las personas que hacen posible la gestión diaria y el crecimiento de nuestro club.</p>
        </div>

        <div style="background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); max-width: 700px; margin: 0 auto;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <tr style="background: var(--color-primario); color: white; font-weight: bold;">
                    <th style="padding: 15px;">Cargo</th>
                    <th style="padding: 15px;">Nombre y Apellidos</th>
                </tr>
                <tr style="border-bottom: 1px solid #e2e8f0;">
                    <td style="padding: 15px; font-weight: 600; color: var(--color-secundario);">Presidente</td>
                    <td style="padding: 15px;">[Nombre del Presidente]</td>
                </tr>
                <tr style="border-bottom: 1px solid #e2e8f0; background-color: #f8fafc;">
                    <td style="padding: 15px; font-weight: 600; color: var(--color-secundario);">Vicepresidente</td>
                    <td style="padding: 15px;">[Nombre del Vicepresidente]</td>
                </tr>
                <tr style="border-bottom: 1px solid #e2e8f0;">
                    <td style="padding: 15px; font-weight: 600; color: var(--color-secundario);">Secretario</td>
                    <td style="padding: 15px;">[Nombre del Secretario]</td>
                </tr>
                <tr>
                    <td style="padding: 15px; font-weight: 600; color: var(--color-secundario);">Tesorero</td>
                    <td style="padding: 15px;">[Nombre del Tesorero]</td>
                </tr>
            </table>
        </div>
    </main>

    </body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* CABECERA */
.cabecera {
    background: #0a1a2f;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    border-bottom: 4px solid #c9a227;
    flex-wrap: wrap;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-placeholder {
    width: 40px;
    height: 40px;
    background: #c9a227;
    color: #0a1a2f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border-radius: 6px;
}

.logo-text h1 {
    margin: 0;
    font-size: 18px;
}

.logo-text p {
    margin: 0;
    font-size: 12px;
    opacity: 0.8;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    font-weight: bold;
    font-size: 14px;
}

nav a:hover {
    color: #c9a227;
}
<title>Noticias - CCRD Ferroviario</title>
<link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<h1>Noticias</h1>

<p>Aquí se publicarán las noticias del club.</p>

</body>
</html>
